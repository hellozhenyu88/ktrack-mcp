server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;

    # Enterprise SPA (default) — root-level
    root /usr/share/nginx/html/enterprise;
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 劳动者端 H5
    location /freelancer/ {
        alias /usr/share/nginx/html/freelancer/;
        index index.html;
        try_files $uri $uri/ /freelancer/index.html;
    }

    # MCP Developer Portal SPA
    location = /mcp-portal { return 301 /mcp-portal/; }
    location /mcp-portal/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /mcp-portal/index.html;
    }

    # API proxy
    location /uploads/ {
        proxy_pass http://127.0.0.1:3200/uploads/;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # MCP protocol endpoint
    location = /mcp {
        proxy_pass http://127.0.0.1:3200/mcp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
