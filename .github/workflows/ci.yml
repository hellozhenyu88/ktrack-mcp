name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-build:
    name: Server — Type Check & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Generate Prisma Client
        working-directory: server
        run: npx prisma generate

      - name: Type check & build
        working-directory: server
        run: npm run build

  portal-build:
    name: Portal — Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mcp-portal/package-lock.json

      - name: Install dependencies
        working-directory: mcp-portal
        run: npm ci

      - name: Lint
        working-directory: mcp-portal
        run: npm run lint

      - name: Build
        working-directory: mcp-portal
        run: npm run build
